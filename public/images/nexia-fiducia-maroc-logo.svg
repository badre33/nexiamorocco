<svg width="300" height="120" viewBox="0 0 300 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Nexia logo based on your image -->
  <g transform="translate(20, 20)">
    <!-- Main circular element -->
    <circle cx="30" cy="30" r="30" fill="#00B9B9"/>
    
    <!-- Inner design elements - interconnected circular shapes -->
    <circle cx="20" cy="20" r="8" fill="#FFFFFF" opacity="0.3"/>
    <circle cx="40" cy="20" r="8" fill="#FFFFFF" opacity="0.3"/>
    <circle cx="30" cy="35" r="6" fill="#FFFFFF" opacity="0.4"/>
    
    <!-- Connecting lines/paths -->
    <path d="M20 20 L40 20 L30 35 Z" fill="#FFFFFF" opacity="0.2"/>
    <path d="M15 15 Q30 5 45 15" stroke="#FFFFFF" stroke-width="2" fill="none" opacity="0.3"/>
    <path d="M15 45 Q30 55 45 45" stroke="#FFFFFF" stroke-width="2" fill="none" opacity="0.3"/>
    
    <!-- Additional connecting elements -->
    <ellipse cx="25" cy="25" rx="12" ry="8" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.3" transform="rotate(30 25 25)"/>
    <ellipse cx="35" cy="35" rx="12" ry="8" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.3" transform="rotate(-30 35 35)"/>
  </g>
  
  <!-- NEXIA text -->
  <text x="90" y="50" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="#FFFFFF" letter-spacing="2px">
    NEXIA
  </text>
  
  <!-- Fiducia Maroc text -->
  <text x="90" y="80" font-family="Arial, sans-serif" font-size="18" font-weight="400" fill="#FFFFFF" letter-spacing="1px">
    Fiducia Maroc
  </text>
</svg>