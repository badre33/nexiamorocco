<svg width="280" height="100" viewBox="0 0 280 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Nexia circular logo -->
  <g transform="translate(10, 15)">
    <!-- Outer ring with gradient effect -->
    <circle cx="25" cy="25" r="25" fill="#00B9B9"/>
    <!-- Inner interlinked design -->
    <path d="M15 10 C25 8, 35 12, 40 20 C38 15, 32 12, 25 12 C20 12, 15 15, 12 20 C14 15, 15 10, 15 10 Z" fill="#2DD4BF" opacity="0.8"/>
    <path d="M10 30 C10 38, 15 42, 22 45 C18 42, 15 38, 15 32 C15 28, 18 24, 22 22 C18 24, 10 27, 10 30 Z" fill="#2DD4BF" opacity="0.8"/>
    <path d="M38 22 C42 24, 45 28, 45 32 C45 38, 42 42, 38 45 C40 42, 42 38, 42 32 C42 28, 40 24, 38 22 Z" fill="#2DD4BF" opacity="0.6"/>
    <!-- Central connecting elements -->
    <ellipse cx="20" cy="20" rx="6" ry="4" fill="#FFFFFF" opacity="0.3" transform="rotate(45 20 20)"/>
    <ellipse cx="30" cy="30" rx="6" ry="4" fill="#FFFFFF" opacity="0.3" transform="rotate(-45 30 30)"/>
    <path d="M18 18 Q25 25, 32 32" stroke="#FFFFFF" stroke-width="2" fill="none" opacity="0.4"/>
  </g>
  
  <!-- Main Nexia text -->
  <text x="75" y="45" font-family="Poppins, Arial, sans-serif" font-size="32" font-weight="700" fill="#FFFFFF">
    Nexia
  </text>
  
  <!-- Fiducia Maroc text below -->
  <text x="75" y="70" font-family="Poppins, Arial, sans-serif" font-size="16" font-weight="400" fill="#FFFFFF">
    Fiducia Maroc
  </text>
</svg>